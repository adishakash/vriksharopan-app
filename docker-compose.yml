version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: vrisharopan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vrisharopan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vrisharopan_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vrisharopan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrisharopan_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vrisharopan_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - vrisharopan_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: vrisharopan_admin
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - vrisharopan_net

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: vrisharopan_website
    restart: unless-stopped
    env_file:
      - ./website/.env
    expose:
      - "3000"
    networks:
      - vrisharopan_net

  nginx:
    image: nginx:1.25-alpine
    container_name: vrisharopan_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - admin-panel
      - website
    networks:
      - vrisharopan_net

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  vrisharopan_net:
    driver: bridge
