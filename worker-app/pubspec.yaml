name: vrisharopan_worker
description: Vrisharopan - Worker App (Tree Planting & Maintenance)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local Storage & Offline
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.1.2

  # Location & Maps
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Camera & Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
