# Temporary HTTP-only nginx config used ONLY during initial SSL certificate acquisition.
# After running init-ssl.sh, the main nginx/nginx.conf (with HTTPS) takes over.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name vrisharopan.in www.vrisharopan.in admin.vrisharopan.in api.vrisharopan.in;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Server is starting up. SSL certificates are being configured.';
            add_header Content-Type text/plain;
        }
    }
}
